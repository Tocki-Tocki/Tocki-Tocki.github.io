<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plataforma de Subastas en Tiempo Real</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .loader {
      border-top-color: #4f46e5;
      -webkit-animation: spinner 1.5s linear infinite;
      animation: spinner 1.5s linear infinite;
    }
    @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg);} 100% { -webkit-transform: rotate(360deg);} }
    @keyframes spinner { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .thumbnail.active { border-color: #4f46e5; opacity: 1; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="loading-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4">
    <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-32 w-32"></div>
  </div>

  <div class="container mx-auto p-4 md:p-8">
    <!-- PERFIL -->
    <div id="user-profile-area" class="mb-6"></div>

    <!-- LOBBY -->
    <div id="lobby-view" class="hidden">
      <header class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900">Subastas Activas</h1>
        <p class="text-gray-600 mt-2">Explora los productos y haz tu mejor oferta.</p>
      </header>
      <div id="auction-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- DETALLE -->
    <div id="detail-view" class="hidden">
      <button id="back-to-lobby-btn" class="mb-6 bg-gray-200 text-gray-800 py-2 px-4 rounded-lg hover:bg-gray-300 transition-colors">
        &larr; Volver a todas las subastas
      </button>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Columna Producto -->
        <div class="bg-white p-6 rounded-xl shadow-lg">
          <div id="carousel-container" class="relative w-full">
            <div id="main-image-container" class="mb-2 rounded-lg overflow-hidden">
              <img id="product-image" src="https://placehold.co/600x400/3498db/ffffff?text=Producto" alt="Imagen del Producto" class="w-full h-80 object-cover transition-transform duration-300 ease-in-out">
            </div>
            <button id="prev-btn" class="absolute top-1/2 left-2 -translate-y-1/2 bg-black bg-opacity-40 text-white p-2 rounded-full hover:bg-opacity-60 transition-opacity">&lt;</button>
            <button id="next-btn" class="absolute top-1/2 right-2 -translate-y-1/2 bg-black bg-opacity-40 text-white p-2 rounded-full hover:bg-opacity-60 transition-opacity">&gt;</button>
            <div id="thumbnail-container" class="flex justify-center gap-2 mt-2 flex-wrap"></div>
          </div>
          <h2 id="product-name" class="text-3xl font-bold mb-2 mt-4"></h2>
          <p id="product-description" class="text-gray-600"></p>
        </div>

        <!-- Columna Subasta -->
        <div class="bg-white p-6 rounded-xl shadow-lg flex flex-col">
          <div id="auction-status-banner" class="p-4 rounded-lg text-center mb-4"></div>
          <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div>
              <p class="text-sm text-gray-500">Oferta Actual</p>
              <p id="current-bid" class="text-4xl font-bold text-green-600">$0</p>
            </div>
            <div>
              <p class="text-sm text-gray-500">Tiempo Restante</p>
              <p id="countdown-timer" class="text-4xl font-bold text-red-600">00:00:00</p>
            </div>
          </div>
          <div class="mb-4 text-center">
            <p class="text-sm text-gray-500">Oferta más alta por:</p>
            <p id="highest-bidder" class="font-semibold text-lg text-gray-800 truncate"></p>
            <div id="withdraw-bid-container" class="mt-2"></div>
          </div>
          <form id="bid-form" class="space-y-4">
            <div>
              <label for="bid-amount" class="block text-sm font-medium text-gray-700">Tu oferta:</label>
              <div class="mt-1 relative rounded-md shadow-sm">
                <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center"><span class="text-gray-500 sm:text-sm">$</span></div>
                <input type="number" id="bid-amount" name="bid-amount" class="w-full pl-7 pr-12 py-3 border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500" placeholder="0.00">
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button type="submit" id="submit-bid" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md font-semibold hover:bg-indigo-700">Realizar Oferta</button>
              <button type="button" id="quick-bid-btn" class="w-full bg-green-600 text-white py-3 px-4 rounded-md font-semibold hover:bg-green-700 whitespace-nowrap">Oferta Rápida</button>
            </div>
          </form>
          <div id="message-box" class="mt-4 text-center text-sm font-medium"></div>
          <div class="mt-6 flex-grow">
            <h3 class="text-lg font-semibold mb-2">Historial de Ofertas</h3>
            <div id="bid-history-container" class="h-48 overflow-y-auto bg-gray-50 p-3 rounded-md border">
              <ul id="bid-history" class="space-y-2"></ul>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /detalle -->
  </div><!-- /container -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, arrayUnion, collection, query, where, getDocs,
      runTransaction, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- CONFIG FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyBap76ek_mUzHru0TdvlUd8jIagieOtcOI",
      authDomain: "tocki-tocki.firebaseapp.com",
      projectId: "tocki-tocki",
      storageBucket: "tocki-tocki.appspot.com",
      messagingSenderId: "246048485007",
      appId: "1:246048485007:web:e0d57da752570cf73acafa",
      measurementId: "G-WZQB1M3JD6"
    };

    // --- IMÁGENES MOCK ---
    const PRODUCT_IMAGES = {
      'reloj-suizo-01': [
        'https://placehold.co/600x400/1abc9c/ffffff?text=Reloj+1',
        'https://placehold.co/600x400/16a085/ffffff?text=Reloj+2',
        'https://placehold.co/600x400/27ae60/ffffff?text=Reloj+3'
      ],
      'laptop-gamer-02': [
        'https://placehold.co/600x400/3498db/ffffff?text=Laptop+1',
        'https://placehold.co/600x400/2980b9/ffffff?text=Laptop+2'
      ],
      'consola-juegos-03': ['https://placehold.co/600x400/9b59b6/ffffff?text=Consola'],
      'camara-profesional-04': [
        'https://placehold.co/600x400/e74c3c/ffffff?text=Cámara+1',
        'https://placehold.co/600x400/c0392b/ffffff?text=Cámara+2',
        'https://placehold.co/600x400/d35400/ffffff?text=Cámara+3',
        'https://placehold.co/600x400/e67e22/ffffff?text=Cámara+4'
      ],
      'slot-05': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+5'],
      'slot-06': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+6'],
      'slot-07': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+7'],
      'slot-08': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+8'],
      'slot-09': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+9'],
      'slot-10': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+10'],
      'slot-11': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+11'],
      'slot-12': ['https://placehold.co/600x400/bdc3c7/ffffff?text=Slot+12'],
    };

    // --- PRODUCTOS ---
    const AUCTION_PRODUCTS = [
      { isActive: true, productId: 'reloj-suizo-01', productName: 'Reloj Suizo de Colección', productDescription: 'Reloj automático suizo con maquinaria visible y correa de cuero.', startingBid: 500, auctionDurationHours: 12, minIncrement: 50 },
      { isActive: true, productId: 'laptop-gamer-02', productName: 'Laptop Gamer X-Force', productDescription: 'GPU de última gen, 32GB RAM, pantalla 144Hz.', startingBid: 1200, auctionDurationHours: 24, minIncrement: 100 },
      { isActive: true, productId: 'consola-juegos-03', productName: 'Consola NextGen', productDescription: '1TB de almacenamiento, control inalámbrico.', startingBid: 450, auctionDurationHours: 8, minIncrement: 25 },
      { isActive: true, productId: 'camara-profesional-04', productName: 'Cámara Mirrorless Pro', productDescription: 'Full-Frame 42MP, 4K, estabilización 5 ejes.', startingBid: 1800, auctionDurationHours: 48, minIncrement: 150 },
      { isActive: false, productId: 'slot-05', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-06', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-07', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-08', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-09', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-10', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-11', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
      { isActive: false, productId: 'slot-12', productName: 'Producto Desactivado', productDescription: '', startingBid: 0, auctionDurationHours: 1, minIncrement: 1 },
    ];

    // --- DOM ---
    const loadingOverlay = document.getElementById('loading-overlay');
    const userProfileArea = document.getElementById('user-profile-area');
    const lobbyView = document.getElementById('lobby-view');
    const auctionList = document.getElementById('auction-list');
    const detailView = document.getElementById('detail-view');
    const backToLobbyBtn = document.getElementById('back-to-lobby-btn');
    const productNameEl = document.getElementById('product-name');
    const productDescriptionEl = document.getElementById('product-description');
    const productImageEl = document.getElementById('product-image');
    const currentBidEl = document.getElementById('current-bid');
    const highestBidderEl = document.getElementById('highest-bidder');
    const countdownTimerEl = document.getElementById('countdown-timer');
    const bidForm = document.getElementById('bid-form');
    const bidAmountInput = document.getElementById('bid-amount');
    const submitBidBtn = document.getElementById('submit-bid');
    const quickBidBtn = document.getElementById('quick-bid-btn');
    const bidHistoryEl = document.getElementById('bid-history');
    const messageBox = document.getElementById('message-box');
    const auctionStatusBanner = document.getElementById('auction-status-banner');
    const withdrawBidContainer = document.getElementById('withdraw-bid-container');
    const thumbnailContainer = document.getElementById('thumbnail-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // --- Estado ---
    let db, auth;
    let currentUser = null, userProfile = null;
    let currentAuctionId = null;
    let currentAuctionData = null;
    let countdownIntervals = {};
    let currentImageIndex = 0;

    // --- Inicio ---
    async function main() {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);

      backToLobbyBtn.addEventListener('click', showLobbyView);
      bidForm.addEventListener('submit', handleBidSubmit);
      quickBidBtn.addEventListener('click', handleQuickBid);

      onAuthStateChanged(auth, handleAuthStateChange);
    }

    // --- Errores permisos ---
    function handlePermissionError() {
      loadingOverlay.style.display = 'flex';
      loadingOverlay.innerHTML = `
        <div class="text-white text-center p-8 bg-red-800 rounded-lg shadow-2xl max-w-lg mx-auto">
          <h2 class="text-3xl font-bold mb-4">¡ACCIÓN REQUERIDA!</h2>
          <p class="mb-4 text-lg">Error de Permisos en Firestore.</p>
          <p class="mt-4 text-base bg-red-900 p-4 rounded-md">
            <strong>Actualiza las Reglas de Firestore para requerir auth y respetar la lógica de pujas.</strong>
            <br><br>
            <strong class="text-left block">Pídeme las reglas y te las paso listas 🛡️</strong>
          </p>
        </div>
      `;
    }

    // --- Auth + Perfil ---
    async function handleAuthStateChange(user) {
      if (user) {
        currentUser = { uid: user.uid };
        await checkUserProfile();
      } else {
        try {
          await signInAnonymously(auth);
        } catch (err) {
          if (err.code === 'auth/admin-restricted-operation') {
            loadingOverlay.innerHTML = `
              <div class="text-white text-center p-8 bg-red-800 rounded-lg shadow-2xl max-w-lg mx-auto">
                <h2 class="text-3xl font-bold mb-4">¡ACCIÓN REQUERIDA!</h2>
                <p class="mb-4 text-lg">Habilita "Inicio de Sesión Anónimo" en Firebase Authentication.</p>
              </div>
            `;
          }
        }
      }
    }

    async function checkUserProfile() {
      try {
        const usersRef = doc(db, "users", currentUser.uid);
        const userDoc = await getDoc(usersRef);
        if (userDoc.exists()) {
          userProfile = userDoc.data();
          renderUserProfile();
          await loadLobby();
        } else {
          renderProfileInputForm();
        }
      } catch (error) {
        if (error.code === 'permission-denied') handlePermissionError();
        else console.error("Error al verificar perfil:", error);
      }
    }

    function renderProfileInputForm() {
      userProfileArea.innerHTML = `
        <div id="profile-modal" class="bg-indigo-100 border-l-4 border-indigo-500 text-indigo-800 p-4 rounded-md shadow-lg">
          <h3 class="font-bold text-lg">Crea tu Perfil para Participar</h3>
          <p class="mb-3">Tu Nickname será tu identificador público en las subastas.</p>
          <form id="profile-form" class="space-y-3">
            <div><label class="block text-sm font-medium">Nombre Completo</label><input type="text" id="name-input" required class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md"></div>
            <div><label class="block text-sm font-medium">Cédula</label><input type="number" id="cedula-input" required class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md"></div>
            <div><label class="block text-sm font-medium">Número de Teléfono</label><input type="tel" id="phone-input" required class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md"></div>
            <div><label class="block text-sm font-medium">Nickname (único)</label><input type="text" id="nickname-input" required class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md"></div>
            <button type="submit" id="profile-submit-btn" class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-md">Crear Perfil</button>
          </form>
          <div id="profile-error" class="text-red-600 text-sm mt-2 font-semibold"></div>
        </div>
      `;
      document.getElementById('profile-form').addEventListener('submit', saveUserProfile);
      loadingOverlay.style.display = 'none';
    }

    async function saveUserProfile(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('profile-submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verificando...';
      const errorEl = document.getElementById('profile-error');
      errorEl.textContent = '';

      const name = document.getElementById('name-input').value.trim();
      const cedula = document.getElementById('cedula-input').value.trim();
      const phone = document.getElementById('phone-input').value.trim();
      const nickname = document.getElementById('nickname-input').value.trim();

      try {
        if (!name || !cedula || !phone || !nickname) throw new Error('Todos los campos son obligatorios.');
        if (!/^\d+$/.test(cedula)) throw new Error('La cédula solo debe contener números.');
        if (!/^\d{7,}$/.test(phone)) throw new Error('El teléfono debe tener al menos 7 dígitos.');

        const usersCol = collection(db, "users");
        const q = query(usersCol, where("nickname", "==", nickname.toLowerCase()));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) throw new Error('Este nickname ya está en uso. Por favor, elige otro.');

        const newProfile = {
          displayName: name,
          cedula,
          phone,
          nickname: nickname.toLowerCase(),
          uid: currentUser.uid,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
        };
        const usersRef = doc(db, "users", currentUser.uid);
        await setDoc(usersRef, newProfile);
        userProfile = newProfile;
        userProfileArea.innerHTML = '';
        renderUserProfile();
        loadLobby();
      } catch (error) {
        if (error.code === 'permission-denied') handlePermissionError();
        else {
          errorEl.textContent = error.message;
          document.getElementById('nickname-input').focus();
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear Perfil';
      }
    }

    function renderUserProfile() {
      userProfileArea.innerHTML = `
        <div class="bg-white p-3 rounded-lg shadow-sm border flex justify-between items-center">
          <p>Bienvenido, <strong class="font-semibold">${userProfile.nickname}</strong></p>
          <button id="logout-btn" class="text-sm text-indigo-600 hover:underline">Cerrar Sesión</button>
        </div>
      `;
      document.getElementById('logout-btn').addEventListener('click', () => auth.signOut().then(() => window.location.reload()));
      lobbyView.classList.remove('hidden');
    }

    // --- Navegación ---
    function showLobbyView() {
      detailView.classList.add('hidden');
      lobbyView.classList.remove('hidden');
      currentAuctionId = null;
      currentAuctionData = null;
      document.title = 'Plataforma de Subastas';
    }

    function showDetailView(productId) {
      lobbyView.classList.add('hidden');
      detailView.classList.remove('hidden');
      currentAuctionId = productId;
      Object.values(countdownIntervals).forEach(clearInterval);
      messageBox.textContent = '';

      const auctionRef = doc(db, "auctions", productId);
      onSnapshot(auctionRef, (docSnap) => {
        if (currentAuctionId === productId && docSnap.exists()) {
          const data = docSnap.data();
          if (!currentAuctionData) {
            const imageUrls = PRODUCT_IMAGES[data.productId] || ['https://placehold.co/600x400/cccccc/ffffff?text=No+Image'];
            renderCarousel(imageUrls);
          }
          currentAuctionData = data;
          updateDetailViewUI(currentAuctionData);
        }
      });
    }

    // --- Lobby ---
    async function loadLobby() {
      try {
        await setupAuctions();
        const auctionsCol = collection(db, "auctions");
        onSnapshot(query(auctionsCol, where("isActive", "==", true)), (snapshot) => {
          const auctionsData = [];
          snapshot.forEach(d => auctionsData.push({ id: d.id, ...d.data() }));
          renderLobby(auctionsData);
          loadingOverlay.style.display = 'none';
        }, (error) => {
          if (error.code === 'permission-denied') handlePermissionError();
        });
      } catch (error) {
        if (error.code === 'permission-denied') handlePermissionError();
      }
    }

    async function setupAuctions() {
      const auctionsCol = collection(db, "auctions");
      for (const product of AUCTION_PRODUCTS) {
        const auctionRef = doc(auctionsCol, product.productId);
        const docSnap = await getDoc(auctionRef);
        if (!docSnap.exists()) {
          const now = new Date();
          const end = new Date(now.getTime() + product.auctionDurationHours * 60 * 60 * 1000);
          await setDoc(auctionRef, {
            ...product,
            currentBid: product.startingBid,
            highestBidder: { nickname: 'Nadie aún', uid: null },
            endTime: Timestamp.fromDate(end), // <-- Timestamp
            bids: [],
            status: 'active',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
          });
        }
      }
    }

    function renderLobby(auctions) {
      auctionList.innerHTML = '';
      auctions.forEach(auction => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl shadow-lg overflow-hidden transform hover:-translate-y-1 transition-transform duration-300 cursor-pointer';
        card.dataset.id = auction.id;

        const timeId = `time-${auction.id}`, bidId = `bid-${auction.id}`;
        const imageUrls = PRODUCT_IMAGES[auction.id] || ['https://placehold.co/600x400/cccccc/ffffff?text=No+Image'];

        card.innerHTML = `
          <img src="${imageUrls[0]}" alt="${auction.productName}" class="w-full h-48 object-cover">
          <div class="p-4">
            <h3 class="text-xl font-bold text-gray-900 truncate">${auction.productName}</h3>
            <div class="mt-4 flex justify-between items-center">
              <div>
                <p class="text-sm text-gray-500">Oferta actual</p>
                <p id="${bidId}" class="text-2xl font-bold text-green-600">$${auction.currentBid.toLocaleString()}</p>
              </div>
              <div>
                <p class="text-sm text-gray-500 text-right">Termina en</p>
                <p id="${timeId}" class="text-xl font-bold text-red-600">--:--:--</p>
              </div>
            </div>
          </div>
        `;
        auctionList.appendChild(card);
        card.addEventListener('click', () => showDetailView(auction.id));

        document.getElementById(bidId).textContent = formatBid(auction.currentBid);
        updateCardTimer(timeId, auction.endTime, auction.status);
      });
    }

    function updateCardTimer(elementId, endTimeVal, status) {
      if (countdownIntervals[elementId]) clearInterval(countdownIntervals[elementId]);
      const timerEl = document.getElementById(elementId);
      const endTime = endTimeVal instanceof Timestamp ? endTimeVal.toDate() : new Date(endTimeVal);

      function update() {
        if (!timerEl) return;
        const timeLeft = endTime - new Date();
        if (timeLeft <= 0 || status === 'ended') {
          timerEl.textContent = 'Finalizada';
          clearInterval(countdownIntervals[elementId]);
        } else {
          const h = Math.floor(timeLeft / 3600000).toString().padStart(2, '0');
          const m = Math.floor((timeLeft % 3600000) / 60000).toString().padStart(2, '0');
          const s = Math.floor((timeLeft % 60000) / 1000).toString().padStart(2, '0');
          timerEl.textContent = `${h}:${m}:${s}`;
        }
      }
      update();
      countdownIntervals[elementId] = setInterval(update, 1000);
    }

    // --- Carrusel ---
    function renderCarousel(imageUrls) {
      currentImageIndex = 0;
      thumbnailContainer.innerHTML = '';
      imageUrls.forEach((url, index) => {
        const thumb = document.createElement('img');
        thumb.src = url;
        thumb.className = 'thumbnail w-16 h-16 object-cover rounded-md cursor-pointer border-2 border-transparent opacity-60 hover:opacity-100';
        thumb.onclick = () => showImage(index, imageUrls);
        thumbnailContainer.appendChild(thumb);
      });

      prevBtn.onclick = () => showImage(currentImageIndex - 1, imageUrls);
      nextBtn.onclick = () => showImage(currentImageIndex + 1, imageUrls);

      showImage(0, imageUrls);
    }

    function showImage(index, imageUrls) {
      const totalImages = imageUrls.length;
      if (index >= totalImages) index = 0;
      else if (index < 0) index = totalImages - 1;
      currentImageIndex = index;
      productImageEl.src = imageUrls[index];

      const thumbnails = document.querySelectorAll('.thumbnail');
      thumbnails.forEach((thumb, i) => {
        if (i === index) thumb.classList.add('active');
        else thumb.classList.remove('active');
      });
    }

    // --- Detalle ---
    function formatBid(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
      if (num >= 100000) return (num / 1000).toFixed(0) + 'k';
      return num.toLocaleString('es-CO');
    }

    function updateDetailViewUI(data) {
      document.title = data.productName;
      productNameEl.textContent = data.productName;
      productDescriptionEl.textContent = data.productDescription;
      currentBidEl.textContent = `$${formatBid(data.currentBid)}`;
      highestBidderEl.textContent = data.highestBidder?.nickname || 'Nadie aún';

      withdrawBidContainer.innerHTML = '';
      if (currentUser && data.highestBidder?.uid === currentUser.uid) {
        highestBidderEl.innerHTML += ' <span class="text-green-600 font-semibold">(¡Eres tú!)</span>';
        const withdrawBtn = document.createElement('button');
        withdrawBtn.id = 'withdraw-btn';
        withdrawBtn.className = 'text-xs text-red-500 hover:underline';
        withdrawBtn.textContent = 'Retirar mi oferta';
        withdrawBtn.onclick = handleWithdrawBid;
        withdrawBidContainer.appendChild(withdrawBtn);
      }

      const nextBid = (data.currentBid || 0) + (data.minIncrement || 1);
      bidAmountInput.placeholder = `Mínimo $${nextBid.toLocaleString()}`;
      quickBidBtn.textContent = `Ofertar $${nextBid.toLocaleString()}`;
      const allowBidding = data.status === 'active';
      submitBidBtn.disabled = !allowBidding;
      quickBidBtn.disabled = !allowBidding;
      bidAmountInput.disabled = !allowBidding;

      renderBidHistory(data.bids);
      handleAuctionStatus(data);
    }

    async function handleBidSubmit(e) {
      e.preventDefault();
      const bidAmount = parseFloat(bidAmountInput.value);
      await placeBid(bidAmount);
    }

    async function handleQuickBid() {
      if (!currentAuctionData) return;
      const quickBidAmount = currentAuctionData.currentBid + currentAuctionData.minIncrement;
      await placeBid(quickBidAmount);
    }

    // --- PUJA con TRANSACCIÓN + anti-sniping + serverTimestamp
    async function placeBid(newBidAmount) {
      if (!userProfile) return;
      submitBidBtn.disabled = true;
      quickBidBtn.disabled = true;
      submitBidBtn.textContent = 'Procesando...';
      messageBox.textContent = '';

      const auctionRef = doc(db, "auctions", currentAuctionId);

      try {
        await runTransaction(db, async (tx) => {
          const snap = await tx.get(auctionRef);
          if (!snap.exists()) throw new Error("La subasta no existe.");
          const data = snap.data();

          if (data.status !== 'active') throw new Error("La subasta ya ha terminado.");

          const currentBid = data.currentBid;
          const minIncrement = data.minIncrement || 1;
          const requiredMin = currentBid + minIncrement;
          if (isNaN(newBidAmount) || newBidAmount < requiredMin) {
            throw new Error(`Tu oferta debe ser de al menos $${requiredMin.toLocaleString()}.`);
          }

          const end = data.endTime instanceof Timestamp ? data.endTime.toDate() : new Date(data.endTime);
          const now = new Date();
          const msLeft = end.getTime() - now.getTime();

          const newBids = (data.bids || []).concat([{
            uid: currentUser.uid,
            nickname: userProfile.nickname,
            amount: newBidAmount,
            timestamp: serverTimestamp() // consistente entre clientes
          }]);

          const updatePayload = {
            currentBid: newBidAmount,
            highestBidder: { nickname: userProfile.nickname, uid: currentUser.uid },
            bids: newBids,
            updatedAt: serverTimestamp(),
          };

          // Anti-sniping: si queda < 60s, extiende 22s
          if (msLeft < 60000) {
            const newEnd = new Date(now.getTime() + 22 * 1000);
            updatePayload.endTime = Timestamp.fromDate(newEnd);
          }

          tx.update(auctionRef, updatePayload);
        });

        messageBox.textContent = '¡Oferta realizada con éxito!';
        messageBox.className = 'mt-4 text-center text-sm font-medium text-green-600';
        bidAmountInput.value = '';
      } catch (error) {
        messageBox.textContent = error.message;
        messageBox.className = 'mt-4 text-center text-sm font-medium text-red-600';
      } finally {
        submitBidBtn.disabled = false;
        quickBidBtn.disabled = false;
        submitBidBtn.textContent = 'Realizar Oferta';
      }
    }

    // --- Retirar oferta con TRANSACCIÓN
    async function handleWithdrawBid() {
      const withdrawBtn = document.getElementById('withdraw-btn');
      if (withdrawBtn) {
        withdrawBtn.disabled = true;
        withdrawBtn.textContent = 'Retirando...';
      }

      const auctionRef = doc(db, "auctions", currentAuctionId);
      try {
        await runTransaction(db, async (tx) => {
          const snap = await tx.get(auctionRef);
          if (!snap.exists()) throw new Error("La subasta no existe.");
          const data = snap.data();

          if (!data.highestBidder || data.highestBidder.uid !== currentUser.uid) {
            throw new Error("Ya no eres el mayor postor.");
          }

          const remainingBids = (data.bids || []).filter(b => b.uid !== currentUser.uid);

          if (remainingBids.length === 0) {
            tx.update(auctionRef, {
              bids: [],
              currentBid: data.startingBid,
              highestBidder: { nickname: 'Nadie aún', uid: null },
              updatedAt: serverTimestamp(),
            });
          } else {
            const sorted = [...remainingBids].sort((a, b) => b.amount - a.amount);
            const newTop = sorted[0];
            tx.update(auctionRef, {
              bids: remainingBids,
              currentBid: newTop.amount,
              highestBidder: { nickname: newTop.nickname, uid: newTop.uid },
              updatedAt: serverTimestamp(),
            });
          }
        });

        messageBox.textContent = 'Tu oferta ha sido retirada con éxito.';
        messageBox.className = 'mt-4 text-center text-sm font-medium text-green-600';
      } catch (error) {
        messageBox.textContent = `Error al retirar: ${error.message}`;
        messageBox.className = 'mt-4 text-center text-sm font-medium text-red-600';
      }
    }

    function renderBidHistory(bids) {
      bidHistoryEl.innerHTML = '';
      if (!bids || bids.length === 0) {
        bidHistoryEl.innerHTML = '<li class="text-gray-500 text-center">Aún no hay ofertas.</li>';
        return;
      }
      // Ordenar por timestamp (maneja serverTimestamp: Timestamp)
      const normalizeTs = (t) => (t instanceof Timestamp ? t.toDate().getTime() : new Date(t).getTime());
      const sortedBids = [...bids].sort((a, b) => normalizeTs(b.timestamp) - normalizeTs(a.timestamp));

      sortedBids.forEach(bid => {
        const li = document.createElement('li');
        const isCurrentUser = currentUser && bid.uid === currentUser.uid;
        li.className = `flex justify-between items-center p-2 rounded-md ${isCurrentUser ? 'bg-blue-100' : 'bg-gray-100'}`;
        li.innerHTML = `
          <span class="font-semibold text-sm truncate">${bid.nickname}</span>
          <span class="font-bold text-gray-800">$${(bid.amount || 0).toLocaleString()}</span>
        `;
        bidHistoryEl.appendChild(li);
      });
    }

    function handleAuctionStatus(data) {
      const timerId = `detail-timer-${data.productId}`;
      if (countdownIntervals[timerId]) clearInterval(countdownIntervals[timerId]);
      const endTime = data.endTime instanceof Timestamp ? data.endTime.toDate() : new Date(data.endTime);

      function update() {
        const timeLeft = endTime - new Date();
        if (timeLeft <= 0 || data.status === 'ended') {
          clearInterval(countdownIntervals[timerId]);
          countdownTimerEl.textContent = "Finalizada";
          auctionStatusBanner.innerHTML = `<h3 class="text-xl font-bold text-white">Subasta Terminada</h3><p class="text-white">Ganador: <strong class="font-semibold">${data.highestBidder?.nickname || 'Nadie'}</strong></p>`;
          auctionStatusBanner.className = 'p-4 rounded-lg text-center mb-4 bg-red-600';
          submitBidBtn.disabled = true;
          quickBidBtn.disabled = true;
          bidAmountInput.disabled = true;
          // IMPORTANTE: NO cambiar status en cliente. El servidor debe hacerlo.
        } else {
          const h = Math.floor(timeLeft / 3600000).toString().padStart(2, '0');
          const m = Math.floor((timeLeft % 3600000) / 60000).toString().padStart(2, '0');
          const s = Math.floor((timeLeft % 60000) / 1000).toString().padStart(2, '0');
          countdownTimerEl.textContent = `${h}:${m}:${s}`;
          auctionStatusBanner.innerHTML = `<h3 class="text-xl font-bold text-white">¡Subasta en curso!</h3>`;
          auctionStatusBanner.className = 'p-4 rounded-lg text-center mb-4 bg-green-600';
          submitBidBtn.disabled = false;
          quickBidBtn.disabled = false;
          bidAmountInput.disabled = false;
        }
      }
      update();
      countdownIntervals[timerId] = setInterval(update, 1000);
    }

    // --- Iniciar ---
    main();
  </script>
</body>
</html>
